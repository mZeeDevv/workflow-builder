name: AI Code Suggestions

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  suggestions:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate AI suggestions
        id: ai-suggestions
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPEN_API_KEY }}
        with:
          script: |
            const https = require('https');
            const diff = `${{ steps.diff.outputs.diff }}`;
            
            if (!process.env.OPENAI_API_KEY) {
              console.log('⚠️  OPENAI_API_KEY not configured. Skipping suggestions.');
              process.exit(0);
            }
            
            if (!diff || diff.trim().length === 0) {
              console.log('No changes detected');
              process.exit(0);
            }
            
            const prompt = `Review this code diff and provide 2-3 concise suggestions for improvement:
            
            \`\`\`diff
            ${diff.substring(0, 3000)}
            \`\`\`
            
            Format: Use bullet points. Keep each suggestion under 50 words.`;
            
            const requestBody = JSON.stringify({
              model: 'gpt-3.5-turbo',
              messages: [
                {
                  role: 'system',
                  content: 'You are a code review expert. Provide helpful, constructive suggestions for code improvements.'
                },
                {
                  role: 'user',
                  content: prompt
                }
              ],
              max_tokens: 500,
              temperature: 0.7
            });
            
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.openai.com',
                path: '/v1/chat/completions',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(requestBody),
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`
                }
              };
              
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => { data += chunk; });
                res.on('end', () => {
                  if (res.statusCode === 200) {
                    const response = JSON.parse(data);
                    const suggestions = response.choices[0].message.content;
                    console.log('suggestions=' + suggestions.replace(/\n/g, '%0A'));
                    resolve(suggestions);
                  } else {
                    console.error(`API Error: ${res.statusCode} - ${data}`);
                    resolve('Could not generate suggestions at this time.');
                  }
                });
              });
              
              req.on('error', (error) => {
                console.error('Request error:', error);
                resolve('Could not generate suggestions at this time.');
              });
              
              req.write(requestBody);
              req.end();
            });

      - name: Post suggestions as PR comment
        if: always() && steps.ai-suggestions.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const suggestions = `${{ steps.ai-suggestions.outputs.result }}`;
            
            if (!suggestions || suggestions.includes('Could not generate')) {
              console.log('No valid suggestions to post');
              return;
            }
            
            const comment = `## 🤖 AI Code Suggestions
            
            ${suggestions}
            
            ---
            _Generated by AI Code Review | Powered by OpenAI_`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
